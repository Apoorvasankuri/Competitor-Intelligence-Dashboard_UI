<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitor Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ivory-linen: #F9F8F3; --pure-white: #FFFFFF; --charcoal: #2C2C2C;
            --text-body: #333333; --champagne-silt: #E5E2D0; --watermark-edge: #F2F0E4;
            --text-secondary: #666666;
            --navy: #0F2B4C; --navy-light: #1A3D6D; --navy-mid: #244E7F;
            --blue-accent: #2E6EB5; --blue-pale: rgba(30,74,138,0.08);
            --blue-border: rgba(30,74,138,0.2); --gold-accent: #C9A84C;
        }
        body {
            font-family: 'Montserrat', 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at center, var(--ivory-linen) 0%, var(--watermark-edge) 100%);
            color: var(--charcoal); min-height: 100vh; overflow-x: hidden; letter-spacing: -0.01em;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(15,43,76,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(15,43,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px; pointer-events: none; z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 0 24px; }
        .header {
            padding: 0; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 20%, #4a7ab5 70%,  #d8e6f5 100%);
            position: sticky; top: 0; z-index: 100; animation: slideDown 0.6s ease-out;
            box-shadow: 0 4px 30px rgba(15,43,76,0.25); border-bottom: 3px solid var(--gold-accent);
        }
        .header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 85% 50%, rgba(201,168,76,0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; margin: 0 -24px; position: relative; z-index: 1; }
        .logo-section { display: flex; align-items: center; flex: 0 0 auto; }
        .ivy-brand-block { display: flex; flex-direction: column; align-items: flex-start; }
        .ivy-brand { font-family: 'Montserrat', sans-serif; font-size: 28px; color: #FFFFFF; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; line-height: 1; }
        .brand-divider { width: 40px; height: 2px; background: var(--gold-accent); margin: 8px 0; border-radius: 1px; }
        .brand-caption { font-family: 'Montserrat', sans-serif; font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
        .header-center { flex: 1; text-align: center; }
        .header-title h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; letter-spacing: -0.3px; color: #FFFFFF; line-height: 1.2; margin: 0; }
        .header-subtitle { font-family: 'Montserrat', sans-serif; font-size: 12px; color: var(--gold-accent); font-weight: 500; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
        .header-right { display: flex; align-items: center; flex: 0 0 auto; }
        .kec-logo { height: 40px; width: auto; object-fit: contain; max-width: 120px; }
        .ivy-logo {height: 50px; width: auto; object-fit: contain;}
        .toolbar { display: flex; align-items: center; justify-content: flex-end; padding: 16px 0; border-bottom: 1px solid var(--champagne-silt);gap: 20px; }
        .toolbar-left { display: flex; align-items: center; gap: 16px; }
        .refresh-btn { background: var(--navy); color: #FFFFFF; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .refresh-btn:hover { background: var(--navy-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,43,76,0.2); }
        .refresh-icon { display: inline-block; transition: transform 0.4s ease; }
        .refresh-btn:hover .refresh-icon { transform: rotate(180deg); }
        .toolbar-right { display: flex; align-items: center; gap: 10px; }
        .page-size-label { font-size: 13px; font-weight: 600; color: var(--text-body); }
        .page-size-select { padding: 8px 12px; background: var(--pure-white); border: 1px solid var(--champagne-silt); border-radius: 6px; color: var(--charcoal); font-size: 13px; font-family: 'Montserrat', sans-serif; cursor: pointer; }
        .page-size-select:focus { outline: none; border-color: var(--navy); }
        .nav-tabs { display: flex; gap: 8px; padding: 28px 0; border-bottom: 2px solid var(--champagne-silt); animation: fadeIn 0.8s ease-out 0.2s backwards; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn { padding: 12px 28px; background: transparent; border: 2px solid var(--champagne-silt); color: var(--navy); border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; letter-spacing: 0.3px; }
        .tab-btn:hover { border-color: var(--navy-light); color: var(--navy-light); }
        .tab-btn.active { background: var(--navy); color: #F9F8F3; border-color: var(--navy); box-shadow: 0 4px 16px rgba(15,43,76,0.2); }
        .content-area { padding: 40px 0; animation: fadeIn 1s ease-out 0.4s backwards; }
        .filter-panel { background: var(--pure-white); border-radius: 8px; padding: 24px; border: 1px solid var(--champagne-silt); position: sticky; top: 140px; max-height: calc(100vh - 200px); overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .filter-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 24px; color: var(--navy); }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-body); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
        .filter-select { width: 100%; padding: 12px 16px; background: var(--ivory-linen); border: 1px solid var(--champagne-silt); border-radius: 6px; color: var(--charcoal); font-size: 14px; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease; }
        .filter-select:hover { border-color: var(--blue-accent); }
        .filter-select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(15,43,76,0.08); }
        .filter-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .filter-btn { padding: 12px; border: 2px solid var(--champagne-silt); border-radius: 6px; background: transparent; color: var(--navy); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: 'Montserrat', sans-serif; }
        .filter-btn.primary { background: var(--navy); color: #FFFFFF; border-color: var(--navy); }
        .filter-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,43,76,0.1); }
        .filter-btn.primary:hover { background: var(--navy-light); border-color: var(--navy-light); }
        .articles-container { display: grid; gap: 24px; }
        .category-header { background: var(--blue-pale); padding: 16px 24px; border-radius: 8px; border-left: 4px solid var(--navy); font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: var(--navy); }
        .article-card { background: var(--pure-white); border-radius: 8px; padding: 24px; border: 1px solid var(--champagne-silt); transition: all 0.3s ease; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .article-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--navy); transform: scaleY(0); transition: transform 0.3s ease; }
        .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(15,43,76,0.12); border-color: var(--blue-accent); }
        .article-card:hover::before { transform: scaleY(1); }
        .exec-bullet:last-child { border-bottom: none !important; }
        .article-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .article-title { font-family: 'Public Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 12px; line-height: 1.4; cursor: pointer; }
        .article-title:hover { color: var(--blue-accent); }
        .article-meta { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-body); font-weight: 500; }
        .meta-icon { width: 16px; height: 16px; opacity: 0.6; stroke: var(--blue-accent); }
        .article-summary { font-size: 14px; color: var(--text-body); line-height: 1.6; margin-top: 8px; }
        .article-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
        .tag { padding: 6px 14px; background: var(--blue-pale); border: 1px solid var(--blue-border); border-radius: 20px; font-size: 12px; color: var(--blue-accent); font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .tag:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(46, 110, 181, 0.2); background: var(--blue-accent); color: white; }
        .tag.competitor { background: rgba(15,43,76,0.08); border-color: rgba(15,43,76,0.2); color: var(--navy); }
        .tag.competitor:hover { background: var(--navy); color: white; }
        .tag.category-tag { background: rgba(201, 168, 76, 0.1); border-color: var(--gold-accent); color: #8B7335; }
        .tag.category-tag:hover { background: var(--gold-accent); color: white; }
        .two-column { display: grid; grid-template-columns: 280px 1fr; gap: 32px; }
        .pagination-container { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 32px; padding: 16px 0; }
        .page-btn { padding: 8px 14px; border: 1px solid var(--champagne-silt); border-radius: 6px; background: var(--pure-white); color: var(--navy); font-size: 13px; font-weight: 600; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.2s ease; min-width: 38px; text-align: center; }
        .page-btn:hover { border-color: var(--navy); background: var(--blue-pale); }
        .page-btn.active { background: var(--navy); color: #FFFFFF; border-color: var(--navy); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 13px; color: var(--text-secondary); font-weight: 500; margin: 0 8px; }
        .empty-state { text-align: center; padding: 80px 40px; background: var(--pure-white); border-radius: 8px; border: 2px dashed var(--champagne-silt); box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 12px; color: var(--navy); }
        .empty-state p { color: var(--text-body); font-size: 16px; line-height: 1.6; max-width: 500px; margin: 0 auto; }
        .retry-btn { background: var(--navy); color: #FFFFFF; border: none; padding: 14px 32px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; }
        .retry-btn:hover { background: var(--navy-light); transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--ivory-linen); }
        ::-webkit-scrollbar-thumb { background: var(--champagne-silt); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blue-accent); }
        @media (max-width: 1024px) { .two-column { grid-template-columns: 1fr; } .filter-panel { position: relative; top: 0; max-height: none; } }
        @media (max-width: 768px) { .header-content { flex-direction: column; gap: 16px; padding: 16px 20px; } .header-title h1 { font-size: 24px; } .header-center { order: -1; } .nav-tabs { overflow-x: auto; padding-bottom: 16px; } .tab-btn { white-space: nowrap; } .toolbar { flex-direction: column; gap: 12px; align-items: flex-start; } } 
    .assign-table { width: 100%; border-collapse: collapse; background: var(--pure-white); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
.assign-table th { background: var(--navy); color: #FFFFFF; padding: 14px 16px; text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-family: 'Montserrat', sans-serif; }
.assign-table td { padding: 14px 16px; border-bottom: 1px solid var(--champagne-silt); font-size: 13px; vertical-align: middle; }
.assign-table tr:last-child td { border-bottom: none; }
.assign-table tr:hover td { background: var(--blue-pale); }
.category-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(201,168,76,0.15); color: #8B7335; border: 1px solid var(--gold-accent); }
.picker-wrap { position: relative; }
.picker-input { width: 100%; padding: 8px 12px; border: 1px solid var(--champagne-silt); border-radius: 6px; font-size: 13px; font-family: 'Montserrat', sans-serif; background: var(--ivory-linen); transition: all 0.2s; min-width: 200px; }
.picker-input:focus { outline: none; border-color: var(--navy); background: white; box-shadow: 0 0 0 3px rgba(15,43,76,0.08); }
.picker-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--champagne-silt); border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 999; max-height: 200px; overflow-y: auto; display: none; }
.picker-dropdown.open { display: block; }
.picker-option { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--champagne-silt); }
.picker-option:last-child { border-bottom: none; }
.picker-option:hover { background: var(--blue-pale); color: var(--navy); font-weight: 600; }
.picker-option .opt-role { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.assign-send-btn { background: var(--navy); color: white; border: none; padding: 12px 32px; border-radius: 6px; font-size: 14px; font-weight: 600; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s; margin-top: 24px; }
.assign-send-btn:hover { background: var(--navy-light); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,43,76,0.2); }
.assign-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.assign-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 6px; padding: 14px 20px; margin-top: 16px; font-size: 14px; font-weight: 600; display: none; }
.manager-input-wrap { background: var(--pure-white); border-radius: 8px; padding: 20px 24px; border: 1px solid var(--champagne-silt); margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.manager-input-wrap label { font-size: 13px; font-weight: 600; color: var(--navy); white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <img src="IVY Logo.png" alt="IVY Logo" class="ivy-logo">
                </div>
                <div class="header-center">
                    <div class="header-title">
                        <h1>Competitor Intelligence</h1>
                        <div class="header-subtitle">Strategic Market Analysis Platform</div>
                    </div>
                </div>
                <div class="header-right">
                    <img src="KEC Logo.png" alt="KEC Logo" class="kec-logo">
                </div>
            </div>
        </header>
        <div class="toolbar">
            <button class="refresh-btn" onclick="loadDataFromAPI()">
                <span class="refresh-icon">&#8635;</span> Refresh Data
            </button>
    
            <div class="toolbar-right">
                <span class="page-size-label">Articles per page:</span>
                <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>
        <nav class="nav-tabs" id="navTabs">
            <button class="tab-btn active" onclick="switchTab('executive')">Executive Summary</button>
            <button class="tab-btn" onclick="switchTab('competitor')">Competitor &amp; SBU</button>
            <button class="tab-btn" onclick="switchTab('industry')">Industry</button>
<button class="tab-btn" onclick="switchTab('assign')" style="display:none;">⚡ Assign Actions</button>
<button class="tab-btn" id="adminTabBtn" style="display:none;" onclick="switchTab('admin')">⚙ Admin</button>
        </nav>
        <main class="content-area" id="contentArea"></main>
    </div>
    <script>
        var API_BASE_URL = 'https://competitor-intelligence-dashboard.onrender.com';
                var LOCAL_API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
                    ? 'http://127.0.0.1:8000' 
                    : 'https://competitor-intelligence-dashboard.onrender.com';
                var kecToken = localStorage.getItem('kec_token');
                var kecUser = JSON.parse(localStorage.getItem('kec_user') || 'null');
                if (!kecToken || !kecUser) { window.location.href = 'login.html'; }
                var appData = { allArticles: [], currentTab: 'executive', filters: { sbu: 'All', competitor: 'All', category: 'All', period: 'All' }, isLoading: false, currentPage: 1, pageSize: 20 };
        var COMPETITOR_ALIAS_MAP = {
            'larsen & toubro': 'L&T', 'larsen and toubro': 'L&T', 'l&t ltd': 'L&T', 'l&t limited': 'L&T', 'l&t construction': 'L&T', 'l&t power': 'L&T', 'l&t metro': 'L&T', 'l&t': 'L&T',
            'tata projects ltd': 'Tata Projects', 'tata projects limited': 'Tata Projects', 'tata projects': 'Tata Projects',
            'kalpataru power transmission': 'Kalpataru', 'kalpataru projects international': 'Kalpataru', 'kptl': 'Kalpataru', 'kalpataru': 'Kalpataru',
            'abb india': 'ABB', 'abb limited': 'ABB', 'abb ltd': 'ABB', 'abb': 'ABB',
            'siemens india': 'Siemens', 'siemens limited': 'Siemens', 'siemens ag': 'Siemens', 'siemens': 'Siemens',
            'ircon international': 'IRCON', 'ircon international ltd': 'IRCON', 'ircon': 'IRCON',
            'rail vikas nigam': 'RVNL', 'rail vikas nigam limited': 'RVNL', 'rvnl': 'RVNL',
            'sterling and wilson': 'Sterling & Wilson', 'sterling & wilson': 'Sterling & Wilson', 's&w': 'Sterling & Wilson', 'sterling and wilson renewable energy': 'Sterling & Wilson', 'sterling & wilson renewable energy': 'Sterling & Wilson',
            'sterlite power': 'Sterlite', 'sterlite grid': 'Sterlite', 'sterlite': 'Sterlite',
            'ncc': 'NCC', 'ncc limited': 'NCC', 'ncc ltd': 'NCC',
            'shapoorji pallonji': 'Shapoorji', 'shapoorji': 'Shapoorji',
            'pnc infratech': 'PNC', 'pnc': 'PNC',
            'simplex infrastructures': 'Simplex', 'simplex': 'Simplex',
            'renew power': 'ReNew', 'renew': 'ReNew', 'renew energy': 'ReNew',
            'hero future energies': 'Hero Future', 'hero future': 'Hero Future',
            'adani': 'Adani', 'adani transmission': 'Adani', 'adani energy solutions': 'Adani',
            'megha engineering': 'Megha Engineering', 'meil': 'Megha Engineering',
            'power grid': 'Power Grid', 'powergrid': 'Power Grid', 'pgcil': 'Power Grid',
            'dilip buildcon': 'Dilip Buildcon', 'jmc projects': 'JMC Projects',
            'hg infra': 'HG Infra', 'h.g. infra': 'HG Infra',
            'techno electric': 'Techno Electric', 'cg power': 'CG Power', 'crompton greaves': 'CG Power',
            'ge t&d': 'GE T&D', 'ge vernova': 'GE T&D'
        };
        
        function normalizeCompetitor(name) {
            if (!name) return null;
            var trimmed = name.trim();
            if (trimmed === '-' || trimmed === '' || trimmed.toLowerCase() === 'none') return null;
            var lower = trimmed.toLowerCase();
            if (COMPETITOR_ALIAS_MAP[lower]) return COMPETITOR_ALIAS_MAP[lower];
            return trimmed;
        }
        
        function extractUniqueCompetitors(articles) {
            var set = new Set();
            articles.forEach(function(a) { a.competitors.forEach(function(c) { if (c) set.add(c); }); });
            return Array.from(set).sort();
        }
        
        function normalizeArticleCompetitors(rawList) {
            var result = [];
            rawList.forEach(function(c) { var norm = normalizeCompetitor(c); if (norm && result.indexOf(norm) === -1) result.push(norm); });
            return result;
        }
        
        function getDateCutoff(period) {
            if (period === 'All') return null;
            var now = new Date(); var cutoff = new Date();
            if (period === '7') cutoff.setDate(now.getDate() - 7);
            else if (period === '15') cutoff.setDate(now.getDate() - 15);
            else if (period === '30') cutoff.setDate(now.getDate() - 30);
            else if (period === '90') cutoff.setDate(now.getDate() - 90);
            else if (period === '180') cutoff.setDate(now.getDate() - 180);
            return cutoff;
        }
        
        function initApp() {
            var toolbar = document.querySelector('.toolbar');
            if (toolbar && kecUser) {
                var badge = document.createElement('div');
                badge.style.cssText = 'display:flex;align-items:center;gap:8px;margin-right:auto;';
                badge.innerHTML = '<span style="font-size:13px;font-weight:600;color:var(--navy);">' + kecUser.name + '</span>' +
                    '<span style="font-size:11px;color:var(--text-secondary);background:var(--blue-pale);padding:3px 10px;border-radius:12px;border:1px solid var(--blue-border);">' + kecUser.sbu_profile + '</span>' +
                    '<button onclick="doLogout()" style="padding:6px 14px;background:transparent;border:1.5px solid var(--champagne-silt);border-radius:6px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:Montserrat,sans-serif;">Sign Out</button>';
                toolbar.insertBefore(badge, toolbar.firstChild);
            }
            if (kecUser && kecUser.is_admin) {
                var adminBtn = document.getElementById('adminTabBtn');
                if (adminBtn) adminBtn.style.display = 'inline-block';
            }
            loadDataFromAPI();
        }
        function doLogout() {

        var CATEGORY_ORDER = [
    'order wins', 'bidding activity', 'project execution',
    'mergers & acquisitions', 'partnerships & alliances',
    'financial', 'stock market'
];

function renderExecutiveSummary() {
    var sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    var recent = appData.allArticles.filter(function(a) {
        return new Date(a.date) >= sevenDaysAgo;
    });

    var grouped = {};
    recent.forEach(function(a) {
        var cat = (a.category || 'general').toLowerCase();
        // Exclude stock market and industry trends
        if (cat === 'industry trends' || cat === 'stock market') return;
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(a);
    });

    Object.keys(grouped).forEach(function(cat) {
    grouped[cat].sort(function(a, b) {
        if (b.rankScore !== a.rankScore) return b.rankScore - a.rankScore;
        return new Date(b.date) - new Date(a.date);
    });

    var dedupedCat = [];
grouped[cat].forEach(function(article) {
    var isDuplicate = dedupedCat.some(function(kept) {

        var stopWords = new Set(['a','an','the','and','or','in','on','at','to','for','of','with','by','is','was','has','this','that','their','these','will','been','also','from']);

        // Helper: compute Jaccard similarity between two summaries
        function jaccardSimilarity(text1, text2) {
            var w1 = text1.toLowerCase().split(/\W+/).filter(function(w) { return w.length > 3 && !stopWords.has(w); });
            var w2 = text2.toLowerCase().split(/\W+/).filter(function(w) { return w.length > 3 && !stopWords.has(w); });
            if (!w1.length || !w2.length) return 0;
            var set2 = new Set(w2);
            var intersection = w1.filter(function(w) { return set2.has(w); }).length;
            var union = new Set(w1.concat(w2)).size;
            return union > 0 ? intersection / union : 0;
        }

        var summary1 = article.summary || article.title || '';
        var summary2 = kept.summary || kept.title || '';
        var jaccard = jaccardSimilarity(summary1, summary2);

        // Signal 1: High summary similarity alone is enough (catches IRCON/RVNL case)
        if (jaccard > 0.35) return true;

        // Signal 2: Same competitors involved
        var sharedCompetitor = article.competitors.length > 0 && kept.competitors.length > 0 &&
            article.competitors.some(function(c) {
                return kept.competitors.indexOf(c) !== -1;
            });
        if (!sharedCompetitor) return false;

        // Signal 3: Same contract value
        var val1 = article.contractValue;
        var val2 = kept.contractValue;
        if (val1 && val2 && Math.abs(val1 - val2) / Math.max(val1, val2) < 0.10) return true;

        // Signal 4: Same competitor + moderate summary overlap (catches Kernex JV variants)
        if (sharedCompetitor && jaccard > 0.20) return true;

        // Signal 5: Same competitor + same geography
        if (sharedCompetitor && article.geography && kept.geography &&
            article.geography.toLowerCase() === kept.geography.toLowerCase()) return true;

        return false;
    });

    if (!isDuplicate) dedupedCat.push(article);
});
    grouped[cat] = dedupedCat.slice(0, 5);
});
    // Build ordered list of categories to display
    var orderedCats = CATEGORY_ORDER.filter(function(cat) {
        return grouped[cat] && grouped[cat].length > 0;
    });
    Object.keys(grouped).sort().forEach(function(cat) {
        if (CATEGORY_ORDER.indexOf(cat) === -1 && grouped[cat].length > 0) orderedCats.push(cat);
    });

    if (orderedCats.length === 0) {
        return '<div class="empty-state"><div class="empty-state-icon">📰</div><h3>No Articles This Week</h3><p>No articles published in the last 7 days.</p></div>';
    }

    var html = '<div class="articles-container">';

    orderedCats.forEach(function(cat) {
        html += '<div class="article-card">';
        html += '<div class="category-header" style="margin: -24px -24px 20px -24px; border-radius: 8px 8px 0 0;">' + cat.toUpperCase() + '</div>';
        html += '<ul style="list-style:none; padding:0; margin:0;">';

        grouped[cat].forEach(function(article) {
            html += '<li class="exec-bullet" style="padding: 16px 0; border-bottom: 1px solid var(--champagne-silt);">';

            // Bold competitor names using the article's own normalized competitors array
            var summary = article.summary || article.title || 'No summary available.';
            if (article.competitors && article.competitors.length > 0) {
                // Sort by length descending to match longer names first (e.g. "Tata Projects" before "Tata")
                var sortedCompetitors = article.competitors.slice().sort(function(a, b) {
                    return b.length - a.length;
                });
                sortedCompetitors.forEach(function(competitor) {
                    if (!competitor || competitor === '-') return;
                    var escaped = competitor.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    var regex = new RegExp('(' + escaped + ')', 'gi');
                    summary = summary.replace(regex, '<strong>$1</strong>');
                });
            }

            html += '<div style="font-size:14px; color:var(--text-body); line-height:1.7;">' + summary + '</div>';

            // Source + date line
            var d = new Date(article.date);
            var fd = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            html += '<div style="margin-top:6px; font-size:12px; color:var(--text-secondary); display:flex; gap:12px; align-items:center;">';
            html += '<span>' + fd + '</span>';
            if (article.source && article.source !== 'Unknown Source') {
                html += '<span style="color:var(--champagne-silt);">|</span>';
                html += '<span style="font-style:italic;">' + article.source + '</span>';
            }
            // Clickable competitors as mini tags
            if (article.competitors && article.competitors.length > 0) {
                html += '<span style="color:var(--champagne-silt);">|</span>';
                article.competitors.forEach(function(c) {
                    if (!c || c === '-') return;
                    html += '<span onclick="filterByTag(\'competitor\', \'' + c.replace(/'/g, "\\'") + '\')" style="cursor:pointer; background:rgba(15,43,76,0.08); padding:2px 8px; border-radius:10px; font-size:11px; color:var(--navy); font-weight:600;">' + c + '</span>';
                });
            }
            html += '</div>';

            html += '</li>';
        });

        html += '</ul></div>';
    });

    html += '</div>';
    return html;
}

var pickerDebounceTimer = null;

function onPickerInput(input, pickerId) {
    var q = input.value.trim();
    assignPickerState[pickerId].selected = null;

    clearTimeout(pickerDebounceTimer);
    if (q.length < 2) { closeDropdown(pickerId); return; }

    pickerDebounceTimer = setTimeout(function() {
        fetch(LOCAL_API + '/api/people/search?q=' + encodeURIComponent(q))
            .then(function(r) { return r.json(); })
            .then(function(data) { renderDropdown(pickerId, data.people || []); })
            .catch(function() { closeDropdown(pickerId); });
    }, 200);
}

function onPickerFocus(input, pickerId) {
    if (input.value.trim().length >= 2) onPickerInput(input, pickerId);
}

function renderDropdown(pickerId, people) {
    var drop = document.getElementById('drop_' + pickerId);
    if (!drop) return;
    if (people.length === 0) { drop.innerHTML = '<div class="picker-option" style="color:var(--text-secondary);">No results found</div>'; drop.classList.add('open'); return; }
    drop.innerHTML = people.map(function(p) {
        return '<div class="picker-option" onclick="selectPerson(\'' + pickerId + '\', ' + JSON.stringify(p).replace(/"/g, '&quot;') + ')">' +
            '<div>' + p.name + '</div>' +
            '<div class="opt-role">' + (p.role || '') + ' · ' + (p.sbu || '') + '</div>' +
            '</div>';
    }).join('');
    drop.classList.add('open');
}

function selectPerson(pickerId, person) {
    assignPickerState[pickerId].selected = person;
    document.getElementById('input_' + pickerId).value = person.name + ' (' + person.email + ')';
    closeDropdown(pickerId);

async function sendAssignments() {
    var managerEmail = document.getElementById('managerEmail').value.trim();
    if (!managerEmail) { alert('Please enter your email address first.'); return; }

    var assignments = [];
    Object.keys(assignPickerState).forEach(function(pickerId) {
        var state = assignPickerState[pickerId];
        if (state.selected) {
            assignments.push({
                article_id: state.article.id || 0,
                assigned_by_email: managerEmail,
                assigned_to_email: state.selected.email,
                assigned_to_name: state.selected.name,
                notes: ''
            });
        }
    });

    if (assignments.length === 0) { alert('Please assign at least one article before sending.'); return; }

    var btn = document.querySelector('.assign-send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
        var response = await fetch(LOCAL_API + '/api/assignments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ assignments: assignments })
        });
        var result = await response.json();
        if (result.status === 'success') {
            document.getElementById('assignSuccess').style.display = 'block';
            btn.textContent = '✅ Sent!';
        }
    } catch (e) {
        alert('Error saving assignments: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Send Assignment Emails';
    }
}

async function saveUser(userId) {
   var name = document.getElementById('formName').value.trim();
    var email = document.getElementById('formEmail').value.trim();
    var password = document.getElementById('formPassword').value;
    var isAdmin = document.getElementById('formIsAdmin').checked;

    // Gather all selected Business Unit choices from checkboxes
    var selectedBUs = [];
    var checkboxes = document.querySelectorAll('.bu-checkbox:checked');
    checkboxes.forEach(function(cb) {
        selectedBUs.push(cb.value);
    });

    if (!name || !email) { alert('Name and email are required.'); return; }
    
    // UI Validation reminder constraint
    if (selectedBUs.length === 0 && !isAdmin) { 
        alert('Please assign at least 1 Business Unit storyline or set as Admin.'); 
        return; 
    }
    if (selectedBUs.length > 4) {
        alert('You selected ' + selectedBUs.length + ' units. It is highly recommended to limit a person to 3-4 options for clarity.');
    }

    // Join choices into a string ("India T&D, Civil, Renewables") expected by database profile structure
    var sbuProfileString = isAdmin && selectedBUs.length === 0 ? 'Admin' : selectedBUs.join(', ');

    try {
        var url = userId ? LOCAL_API + '/api/auth/users/' + userId + '?token=' + kecToken : LOCAL_API + '/api/auth/create-user';
        var method = userId ? 'PUT' : 'POST';
        var body = { name: name, email: email, sbu_profile: sbuProfileString, is_admin: isAdmin };
        if (password) body.password = password;

        var response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        var result = await response.json();
        if (result.status === 'success') {
            document.getElementById('userFormWrap').innerHTML = '';
            loadUsers();
        } else {
            alert('Error: ' + (result.detail || 'Unknown error'));
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function loadUsers() {
    try {
        var response = await fetch(LOCAL_API + '/api/auth/users?token=' + kecToken);
        var result = await response.json();
        if (result.status === 'success') {
            renderUsersTable(result.users);
        }
    } catch (e) {
        document.getElementById('usersTableWrap').innerHTML = '<div style="color:red;padding:20px;">Error loading users: ' + e.message + '</div>';
    }
}

    users.forEach(function(user, i) {

        var lastLogin = user.last_login ? new Date(user.last_login).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : 'Never';

        var profileItems = user.sbu_profile ? user.sbu_profile.split(',') : [];

        }
        
        profileItems.forEach(function(item) {
            var cleanItem = item.trim();
            if(!cleanItem || cleanItem === 'Admin') return;
            var sbuColor = SBU_COLORS[cleanItem] || '#E5E2D0';
            var sbuText = SBU_TEXT[cleanItem] || '#333333';
            badgesHtml += '<span style="background:' + sbuColor + ';color:' + sbuText + ';padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:Montserrat,sans-serif;">' + cleanItem + '</span>';
        });
        if(profileItems.length === 0 && !user.is_admin) {
            badgesHtml += '<span style="color:var(--text-secondary); font-style:italic;">No Storylines</span>';
        }
        badgesHtml += '</div>';

        html += '<tr style="background:' + shade + ';">' +

            '<td style="padding:14px 16px;font-size:13px;color:var(--text-secondary);font-family:Montserrat,sans-serif;">' + user.email + '</td>' +

            '<td style="padding:14px 16px;"><span style="background:' + (user.is_active ? '#E8F5E9' : '#FFEBEE') + ';color:' + (user.is_active ? '#1B5E20' : '#B71C1C') + ';padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;font-family:Montserrat,sans-serif;">' + (user.is_active ? 'Active' : 'Inactive') + '</span></td>' +

            '<td style="padding:14px 16px;display:flex;gap:8px;">' +

            ) : '') +

    html += '</tbody></table>';
    document.getElementById('usersTableWrap').innerHTML = html;

async function deactivateUser(userId) {
    if (!confirm('Deactivate this user? They will no longer be able to log in.')) return;
    try {
        var response = await fetch(LOCAL_API + '/api/auth/users/' + userId + '?token=' + kecToken, { method: 'DELETE' });
        var result = await response.json();
        if (result.status === 'success') loadUsers();
        else alert('Error: ' + result.detail);
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function activateUser(userId) {
    try {
        var response = await fetch(LOCAL_API + '/api/auth/users/' + userId + '/activate?token=' + kecToken, { method: 'PUT' });
        var result = await response.json();
        if (result.status === 'success') loadUsers();
        else alert('Error: ' + result.detail);
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function deleteUser(userId, userName) {
    if (!confirm('Permanently delete ' + userName + '? This cannot be undone.')) return;
    try {
        var response = await fetch(LOCAL_API + '/api/auth/users/' + userId + '/delete?token=' + kecToken, { method: 'DELETE' });
        var result = await response.json();
        if (result.status === 'success') loadUsers();
        else alert('Error: ' + result.detail);
    } catch (e) {
        alert('Error: ' + e.message);
    }
}
async function sendWeeklyDigest() {

    <button class="kec-chat-close" id="kec-chat-close-btn" aria-label="Close chat">✕</button>
  </div>

  <div id="kec-messages">
    <div class="kec-bot-msg">
      Hello! Ask me anything about competitors, order wins, bids, or market activity.
      <div class="kec-chip-row">
        <span class="kec-chip" onclick="kecAskChip('Recent order wins of L&T')">L&T order wins</span>
        <span class="kec-chip" onclick="kecAskChip('Latest bidding activity this week')">This week bids</span>
        <span class="kec-chip" onclick="kecAskChip('Kalpataru recent news')">Kalpataru news</span>
      </div>
    </div>
  </div>

  <div class="kec-input-row">
    <textarea id="kecChatInput" placeholder="Ask about competitors, orders, bids..."
      onkeydown="kecHandleKey(event)"></textarea>
    <button id="kecSendBtn" onclick="kecSendMessage()" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
(function () {
  var KEC_API = 'https://competitor-intelligence-dashboard.onrender.com/api/copilot-search';
  var fab      = document.getElementById('kec-chat-fab');
  var panel    = document.getElementById('kec-chat-panel');
  var closeBtn = document.getElementById('kec-chat-close-btn');
  var msgs     = document.getElementById('kec-messages');
  var input    = document.getElementById('kecChatInput');
  var sendBtn  = document.getElementById('kecSendBtn');

  fab.addEventListener('click', function() {
    panel.classList.add('open');
    fab.style.display = 'none';
    input.focus();
  });
  closeBtn.addEventListener('click', function() {
    panel.classList.remove('open');
    fab.style.display = 'flex';
  });

  function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }

  function addMsg(text, cls) {
    var d = document.createElement('div');
    d.className = cls;
    d.textContent = text;
    msgs.appendChild(d);
    scrollBottom();
    return d;
  }

  function showTyping() {
    var d = document.createElement('div');
    d.className = 'kec-typing';
    d.id = 'kec-typing';
    d.innerHTML = '<div class="kec-dot"></div><div class="kec-dot"></div><div class="kec-dot"></div>';
    msgs.appendChild(d);
    scrollBottom();
  }

  function removeTyping() {
    var t = document.getElementById('kec-typing');
    if (t) t.remove();
  }

  window.kecHandleKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); kecSendMessage(); }
  };

  window.kecAskChip = function(q) {
    input.value = q;
    kecSendMessage();
  };

  window.kecSendMessage = async function() {
    var q = input.value.trim();
    if (!q) return;
    input.value = '';
    sendBtn.disabled = true;
    addMsg(q, 'kec-user-msg');
    showTyping();
    try {
      var res = await fetch(KEC_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      removeTyping();
      if (!res.ok) throw new Error('API error ' + res.status);
      var data = await res.json();
      var answer = data.answer || data.response || data.result || data.message || JSON.stringify(data);
      addMsg(answer, 'kec-bot-msg');
    } catch(err) {
      removeTyping();
      addMsg('Could not reach the server. Please try again. (' + err.message + ')', 'kec-error-msg');
    }
    sendBtn.disabled = false;
    input.focus();
  };
})();
</script>
