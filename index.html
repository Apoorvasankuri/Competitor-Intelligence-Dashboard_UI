<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitor Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ivory-linen: #F9F8F3; --pure-white: #FFFFFF; --deep-forest: #1B4332;
            --sage-bold: #2D6A4F; --charcoal: #2C2C2C; --text-body: #333333;
            --champagne-silt: #E5E2D0; --watermark-edge: #F2F0E4;
            --text-secondary: #666666; --navy: #0F2B4C; --navy-light: #1A3D6D; --gold-accent: #C9A84C;
        }
        body {
            font-family: 'Montserrat', 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at center, var(--ivory-linen) 0%, var(--watermark-edge) 100%);
            color: var(--charcoal); min-height: 100vh; overflow-x: hidden; letter-spacing: -0.01em;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(27,67,50,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(27,67,50,0.02) 1px, transparent 1px);
            background-size: 60px 60px; pointer-events: none; z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 0 24px; }

        /* REDESIGNED HEADER */
        .header {
            padding: 0;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, #244E7F 100%);
            position: sticky; top: 0; z-index: 100;
            animation: slideDown 0.6s ease-out;
            box-shadow: 0 4px 30px rgba(15, 43, 76, 0.25);
            border-bottom: 3px solid var(--gold-accent);
        }
        .header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 85% 50%, rgba(201,168,76,0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .header-content {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 32px; margin: 0 -24px; position: relative; z-index: 1;
        }
        .logo-section { display: flex; align-items: center; gap: 32px; flex: 0 0 auto; }
        .ivy-brand-block { display: flex; flex-direction: column; align-items: flex-start; }
        .ivy-brand {
            font-family: 'Montserrat', sans-serif; font-size: 28px; color: #FFFFFF;
            font-weight: 700; letter-spacing: 4px; text-transform: uppercase; line-height: 1;
        }
        .brand-divider { width: 40px; height: 2px; background: var(--gold-accent); margin: 8px 0; border-radius: 1px; }
        .brand-caption {
            font-family: 'Montserrat', sans-serif; font-size: 11px; color: rgba(255,255,255,0.6);
            font-weight: 400; letter-spacing: 2px; text-transform: uppercase;
        }
        .header-center { flex: 1; text-align: center; }
        .header-title h1 {
            font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
            letter-spacing: -0.3px; color: #FFFFFF; line-height: 1.2; margin: 0;
        }
        .header-subtitle {
            font-family: 'Montserrat', sans-serif; font-size: 12px; color: var(--gold-accent);
            font-weight: 500; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px;
        }
        .header-right { display: flex; align-items: center; gap: 16px; flex: 0 0 auto; }
        .refresh-btn {
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 6px;
            cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease; letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px;
        }
        .refresh-btn:hover {
            background: rgba(255,255,255,0.15); color: #FFFFFF;
            border-color: rgba(255,255,255,0.3); transform: translateY(-1px);
        }
        .refresh-icon { display: inline-block; transition: transform 0.4s ease; }
        .refresh-btn:hover .refresh-icon { transform: rotate(180deg); }
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600;
        }
        .status-badge.success { background: rgba(45,106,79,0.2); border-color: rgba(45,106,79,0.4); color: #6BCB77; }
        .status-badge.error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #FCA5A5; }
        .status-badge.loading { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.3); color: var(--gold-accent); }
        .status-dot { width: 7px; height: 7px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* NAVIGATION TABS */
        .nav-tabs {
            display: flex; gap: 8px; padding: 28px 0; border-bottom: 2px solid var(--champagne-silt);
            animation: fadeIn 0.8s ease-out 0.2s backwards; align-items: center;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn {
            padding: 12px 28px; background: transparent; border: 2px solid var(--champagne-silt);
            color: var(--navy); border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600;
            font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; letter-spacing: 0.3px;
        }
        .tab-btn:hover { border-color: var(--navy-light); color: var(--navy-light); }
        .tab-btn.active { background: var(--navy); color: #F9F8F3; border-color: var(--navy); box-shadow: 0 4px 16px rgba(15,43,76,0.2); }

        /* ALL OTHER STYLES UNCHANGED */
        .content-area { padding: 40px 0; animation: fadeIn 1s ease-out 0.4s backwards; }
        .filter-panel {
            background: var(--pure-white); border-radius: 8px; padding: 24px;
            border: 1px solid var(--champagne-silt); position: sticky; top: 140px;
            max-height: calc(100vh - 200px); overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .filter-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 24px; color: var(--deep-forest); }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-body); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
        .filter-select {
            width: 100%; padding: 12px 16px; background: var(--ivory-linen);
            border: 1px solid var(--champagne-silt); border-radius: 6px; color: var(--charcoal);
            font-size: 14px; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease;
        }
        .filter-select:hover { border-color: var(--sage-bold); }
        .filter-select:focus { outline: none; border-color: var(--deep-forest); box-shadow: 0 0 0 3px rgba(27,67,50,0.08); }
        .filter-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .filter-btn {
            padding: 12px; border: 2px solid var(--champagne-silt); border-radius: 6px; background: transparent;
            color: var(--deep-forest); font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; font-family: 'Montserrat', sans-serif;
        }
        .filter-btn.primary { background: var(--sage-bold); color: var(--ivory-linen); border-color: var(--sage-bold); }
        .filter-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(27,67,50,0.1); }
        .filter-btn.primary:hover { background: var(--deep-forest); border-color: var(--deep-forest); }
        .articles-container { display: grid; gap: 24px; }
        .category-header {
            background: rgba(27,67,50,0.05); padding: 16px 24px; border-radius: 8px;
            border-left: 4px solid var(--deep-forest); margin-bottom: 16px;
            font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
            letter-spacing: 0.5px; color: var(--deep-forest);
        }
        .article-card {
            background: var(--pure-white); border-radius: 8px; padding: 24px;
            border: 1px solid var(--champagne-silt); transition: all 0.3s ease; cursor: pointer;
            position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .article-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
            background: var(--deep-forest); transform: scaleY(0); transition: transform 0.3s ease;
        }
        .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(27,67,50,0.12); border-color: var(--sage-bold); }
        .article-card:hover::before { transform: scaleY(1); }
        .article-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .article-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--deep-forest); margin-bottom: 12px; line-height: 1.4; }
        .article-meta { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-body); font-weight: 500; }
        .meta-icon { width: 16px; height: 16px; opacity: 0.6; stroke: var(--sage-bold); }
        .article-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
        .tag { padding: 6px 14px; background: rgba(45,106,79,0.08); border: 1px solid rgba(45,106,79,0.2); border-radius: 20px; font-size: 12px; color: var(--sage-bold); font-weight: 600; }
        .tag.competitor { background: rgba(27,67,50,0.08); border-color: rgba(27,67,50,0.2); color: var(--deep-forest); }
        .two-column { display: grid; grid-template-columns: 280px 1fr; gap: 32px; }
        .empty-state { text-align: center; padding: 80px 40px; background: var(--pure-white); border-radius: 8px; border: 2px dashed var(--champagne-silt); box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 12px; color: var(--deep-forest); }
        .empty-state p { color: var(--text-body); font-size: 16px; line-height: 1.6; max-width: 500px; margin: 0 auto; }
        .retry-btn { background: var(--sage-bold); color: var(--ivory-linen); border: none; padding: 14px 32px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(45,106,79,0.2); }
        .retry-btn:hover { background: var(--deep-forest); transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--ivory-linen); }
        ::-webkit-scrollbar-thumb { background: var(--champagne-silt); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--sage-bold); }
        @media (max-width: 1024px) { .two-column { grid-template-columns: 1fr; } .filter-panel { position: relative; top: 0; max-height: none; } }
        @media (max-width: 768px) { .header-content { flex-direction: column; gap: 16px; padding: 16px 20px; } .header-title h1 { font-size: 24px; } .header-center { order: -1; } .nav-tabs { overflow-x: auto; padding-bottom: 16px; } .tab-btn { white-space: nowrap; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="ivy-brand-block">
                        <div class="ivy-brand">IVY</div>
                        <div class="brand-divider"></div>
                        <div class="brand-caption">Living Intelligence</div>
                    </div>
                </div>
                <div class="header-center">
                    <div class="header-title">
                        <h1>Competitor Intelligence</h1>
                        <div class="header-subtitle">Strategic Market Analysis Platform</div>
                    </div>
                </div>
                <div class="header-right">
                    <span class="status-badge" id="statusBadge" style="display: none;">
                        <span class="status-dot"></span>
                        <span id="statusText">Data Synced</span>
                    </span>
                    <button class="refresh-btn" onclick="loadDataFromAPI()">
                        <span class="refresh-icon">&#8635;</span> Refresh
                    </button>
                </div>
            </div>
        </header>

        <nav class="nav-tabs" id="navTabs">
            <button class="tab-btn active" onclick="switchTab('executive')">Executive Summary</button>
            <button class="tab-btn" onclick="switchTab('competitor')">Competitor &amp; SBU</button>
            <button class="tab-btn" onclick="switchTab('industry')">Industry</button>
        </nav>

        <main class="content-area" id="contentArea"></main>
    </div>

    <script>
        const API_BASE_URL = 'https://competitor-intelligence-dashboard.onrender.com';
        let appData = { allArticles: [], execSummary: [], currentTab: 'executive', filters: { sbu: 'All', competitor: 'All', category: 'All' }, isLoading: false };

        function initApp() { loadDataFromAPI(); }

        async function loadDataFromAPI() {
            try {
                appData.isLoading = true;
                updateStatusBadge('Loading data...', 'loading');
                const response = await fetch(API_BASE_URL + '/api/data');
                if (!response.ok) throw new Error('API Error: ' + response.status);
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    appData.allArticles = result.data.map(function(row) {
                        return {
                            title: row.newstitle || 'Untitled',
                            date: row.publishedate || new Date().toISOString(),
                            source: row.source || 'Unknown Source',
                            link: row.link || '#',
                            keyword: row.keyword || '',
                            category: row.category_tag || row.keyword || 'General',
                            sbu: parseList(row.sbu_tagging || row.sbu || ''),
                            competitors: parseList(row.competitor || ''),
                            summary: row.kec_business_summary || ''
                        };
                    });
                    appData.execSummary = appData.allArticles.slice(0, 20);
                    updateStatusBadge(appData.allArticles.length + ' articles loaded', 'success');
                    switchTab('executive');
                } else { throw new Error('Invalid API response format'); }
                appData.isLoading = false;
            } catch (error) {
                console.error('Error loading data from API:', error);
                appData.isLoading = false;
                updateStatusBadge('Failed to load data', 'error');
                document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9888;&#65039;</div><h3>Failed to Load Data</h3><p>Could not connect to the API. Please try refreshing the page.</p><p style="color:var(--text-secondary);font-size:14px;margin-top:16px;">Error: ' + error.message + '</p><button class="retry-btn" onclick="loadDataFromAPI()" style="margin-top:20px;">Retry</button></div>';
            }
        }

        function updateStatusBadge(text, status) {
            var badge = document.getElementById('statusBadge');
            var st = document.getElementById('statusText');
            badge.style.display = 'inline-flex';
            st.textContent = text;
            badge.className = 'status-badge ' + status;
        }

        function parseList(str) {
            if (!str) return [];
            return str.toString().split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
        }

        function switchTab(tabName) {
            appData.currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
            if (event && event.target && event.target.classList) event.target.classList.add('active');
            var contentArea = document.getElementById('contentArea');
            if (appData.allArticles.length === 0) { contentArea.innerHTML = renderEmptyState(); return; }
            if (tabName === 'executive') contentArea.innerHTML = renderExecutiveSummary();
            else if (tabName === 'competitor') { contentArea.innerHTML = renderCompetitorView(); setupFilterHandlers(); }
            else if (tabName === 'industry') contentArea.innerHTML = renderIndustryView();
        }

        function renderExecutiveSummary() {
            var articles = appData.execSummary.length > 0 ? appData.execSummary : appData.allArticles.slice(0, 20);
            var grouped = groupByCategory(articles);
            var html = '<div class="articles-container">';
            for (var category in grouped) {
                html += '<div class="category-header">' + category.toUpperCase() + '</div>';
                grouped[category].forEach(function(article) { html += renderArticleCard(article); });
            }
            html += '</div>';
            return html;
        }

        function renderCompetitorView() {
            var allSBUs = new Set(), allCompetitors = new Set(), allCategories = new Set();
            appData.allArticles.forEach(function(article) {
                article.sbu.forEach(function(s) { allSBUs.add(s); });
                article.competitors.forEach(function(c) { allCompetitors.add(c); });
                allCategories.add(article.category);
            });
            return '<div class="two-column"><aside class="filter-panel"><h3 class="filter-title">Filters</h3><div class="filter-group"><label>Business Unit</label><select class="filter-select" id="sbuFilter"><option value="All">All SBUs</option>' + Array.from(allSBUs).sort().map(function(sbu) { return '<option value="' + sbu + '">' + sbu + '</option>'; }).join('') + '</select></div><div class="filter-group"><label>Competitor</label><select class="filter-select" id="competitorFilter"><option value="All">All Competitors</option>' + Array.from(allCompetitors).sort().map(function(comp) { return '<option value="' + comp + '">' + comp + '</option>'; }).join('') + '</select></div><div class="filter-group"><label>Category</label><select class="filter-select" id="categoryFilter"><option value="All">All Categories</option>' + Array.from(allCategories).sort().map(function(cat) { return '<option value="' + cat + '">' + cat + '</option>'; }).join('') + '</select></div><div class="filter-buttons"><button class="filter-btn primary" onclick="applyFilters()">Apply</button><button class="filter-btn" onclick="clearFilters()">Clear</button></div></aside><div id="filteredArticles" class="articles-container">' + renderFilteredArticles() + '</div></div>';
        }

        function renderIndustryView() {
            var sbuOrder = ['Intl T&D', 'India T&D', 'Transportation', 'Civil', 'Renewables', 'Oil & Gas', 'General'];
            var html = '<div class="articles-container">';
            var grouped = {};
            appData.allArticles.forEach(function(article) {
                var primarySBU = article.sbu[0] || 'General';
                if (!grouped[primarySBU]) grouped[primarySBU] = [];
                grouped[primarySBU].push(article);
            });
            sbuOrder.forEach(function(sbu) {
                if (grouped[sbu]) {
                    html += '<div class="category-header">' + sbu.toUpperCase() + '</div>';
                    grouped[sbu].forEach(function(article) { html += renderArticleCard(article); });
                }
            });
            Object.keys(grouped).forEach(function(sbu) {
                if (sbuOrder.indexOf(sbu) === -1) {
                    html += '<div class="category-header">' + sbu.toUpperCase() + '</div>';
                    grouped[sbu].forEach(function(article) { html += renderArticleCard(article); });
                }
            });
            html += '</div>';
            return html;
        }

        function renderArticleCard(article) {
            var dateObj = new Date(article.date);
            var formattedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            return '<div class="article-card" onclick="window.open(\'' + article.link + '\', \'_blank\')">' +
                '<div class="article-header"><h3 class="article-title">' + article.title + '</h3></div>' +
                '<div class="article-meta">' +
                '<span class="meta-item"><svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>' + formattedDate + '</span>' +
                '<span class="meta-item"><svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>' + article.source + '</span></div>' +
                '<div class="article-tags">' +
                article.sbu.map(function(s) { return '<span class="tag">' + s + '</span>'; }).join('') +
                article.competitors.map(function(c) { return '<span class="tag competitor">' + c + '</span>'; }).join('') +
                '</div></div>';
        }

        function renderFilteredArticles() {
            var filtered = appData.allArticles;
            if (appData.filters.sbu !== 'All') filtered = filtered.filter(function(a) { return a.sbu.indexOf(appData.filters.sbu) !== -1; });
            if (appData.filters.competitor !== 'All') filtered = filtered.filter(function(a) { return a.competitors.indexOf(appData.filters.competitor) !== -1; });
            if (appData.filters.category !== 'All') filtered = filtered.filter(function(a) { return a.category === appData.filters.category; });
            if (filtered.length === 0) return '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><h3>No Articles Found</h3><p>Try adjusting your filter criteria</p></div>';
            return filtered.slice(0, 50).map(function(article) { return renderArticleCard(article); }).join('');
        }

        function setupFilterHandlers() {
            var s = document.getElementById('sbuFilter'), c = document.getElementById('competitorFilter'), cat = document.getElementById('categoryFilter');
            if (s) s.value = appData.filters.sbu;
            if (c) c.value = appData.filters.competitor;
            if (cat) cat.value = appData.filters.category;
        }

        function applyFilters() {
            appData.filters.sbu = document.getElementById('sbuFilter').value;
            appData.filters.competitor = document.getElementById('competitorFilter').value;
            appData.filters.category = document.getElementById('categoryFilter').value;
            document.getElementById('filteredArticles').innerHTML = renderFilteredArticles();
        }

        function clearFilters() {
            appData.filters = { sbu: 'All', competitor: 'All', category: 'All' };
            document.getElementById('sbuFilter').value = 'All';
            document.getElementById('competitorFilter').value = 'All';
            document.getElementById('categoryFilter').value = 'All';
            document.getElementById('filteredArticles').innerHTML = renderFilteredArticles();
        }

        function groupByCategory(articles) {
            var grouped = {};
            articles.forEach(function(article) {
                var category = article.category || 'General';
                if (!grouped[category]) grouped[category] = [];
                grouped[category].push(article);
            });
            return grouped;
        }

        function renderEmptyState() {
            return '<div class="empty-state"><div class="empty-state-icon">&#128202;</div><h3>No Data Available</h3><p>The database is currently empty. Data will appear here once your scraping pipeline populates the database.</p><button class="retry-btn" onclick="loadDataFromAPI()" style="margin-top:20px;">Refresh Data</button></div>';
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
