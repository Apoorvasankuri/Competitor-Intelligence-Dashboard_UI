<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitor Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ivory-linen: #F9F8F3; --pure-white: #FFFFFF; --charcoal: #2C2C2C;
            --text-body: #333333; --champagne-silt: #E5E2D0; --watermark-edge: #F2F0E4;
            --text-secondary: #666666;
            --navy: #0F2B4C; --navy-light: #1A3D6D; --navy-mid: #244E7F;
            --blue-accent: #2E6EB5; --blue-pale: rgba(30,74,138,0.08);
            --blue-border: rgba(30,74,138,0.2); --gold-accent: #C9A84C;
        }
        body {
            font-family: 'Montserrat', 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at center, var(--ivory-linen) 0%, var(--watermark-edge) 100%);
            color: var(--charcoal); min-height: 100vh; overflow-x: hidden; letter-spacing: -0.01em;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(15,43,76,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(15,43,76,0.02) 1px, transparent 1px);
            background-size: 60px 60px; pointer-events: none; z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 0 24px; }
        .header {
            padding: 0; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, var(--navy-mid) 100%);
            position: sticky; top: 0; z-index: 100; animation: slideDown 0.6s ease-out;
            box-shadow: 0 4px 30px rgba(15,43,76,0.25); border-bottom: 3px solid var(--gold-accent);
        }
        .header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 85% 50%, rgba(201,168,76,0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; margin: 0 -24px; position: relative; z-index: 1; }
        .logo-section { display: flex; align-items: center; flex: 0 0 auto; }
        .ivy-brand-block { display: flex; flex-direction: column; align-items: flex-start; }
        .ivy-brand { font-family: 'Montserrat', sans-serif; font-size: 28px; color: #FFFFFF; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; line-height: 1; }
        .brand-divider { width: 40px; height: 2px; background: var(--gold-accent); margin: 8px 0; border-radius: 1px; }
        .brand-caption { font-family: 'Montserrat', sans-serif; font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
        .header-center { flex: 1; text-align: center; }
        .header-title h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; letter-spacing: -0.3px; color: #FFFFFF; line-height: 1.2; margin: 0; }
        .header-subtitle { font-family: 'Montserrat', sans-serif; font-size: 12px; color: var(--gold-accent); font-weight: 500; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
        .header-right { display: flex; align-items: center; flex: 0 0 auto; }
        .kec-logo { height: 50px; width: auto; object-fit: contain; }
        .toolbar { display: flex; align-items: center; justify-content: flex-end; padding: 16px 0; border-bottom: 1px solid var(--champagne-silt);gap: 20px; }
        .toolbar-left { display: flex; align-items: center; gap: 16px; }
        .refresh-btn { background: var(--navy); color: #FFFFFF; border: none; padding: 10px 22px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .refresh-btn:hover { background: var(--navy-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,43,76,0.2); }
        .refresh-icon { display: inline-block; transition: transform 0.4s ease; }
        .refresh-btn:hover .refresh-icon { transform: rotate(180deg); }
        .toolbar-right { display: flex; align-items: center; gap: 10px; }
        .page-size-label { font-size: 13px; font-weight: 600; color: var(--text-body); }
        .page-size-select { padding: 8px 12px; background: var(--pure-white); border: 1px solid var(--champagne-silt); border-radius: 6px; color: var(--charcoal); font-size: 13px; font-family: 'Montserrat', sans-serif; cursor: pointer; }
        .page-size-select:focus { outline: none; border-color: var(--navy); }
        .nav-tabs { display: flex; gap: 8px; padding: 28px 0; border-bottom: 2px solid var(--champagne-silt); animation: fadeIn 0.8s ease-out 0.2s backwards; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn { padding: 12px 28px; background: transparent; border: 2px solid var(--champagne-silt); color: var(--navy); border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; letter-spacing: 0.3px; }
        .tab-btn:hover { border-color: var(--navy-light); color: var(--navy-light); }
        .tab-btn.active { background: var(--navy); color: #F9F8F3; border-color: var(--navy); box-shadow: 0 4px 16px rgba(15,43,76,0.2); }
        .content-area { padding: 40px 0; animation: fadeIn 1s ease-out 0.4s backwards; }
        .filter-panel { background: var(--pure-white); border-radius: 8px; padding: 24px; border: 1px solid var(--champagne-silt); position: sticky; top: 140px; max-height: calc(100vh - 200px); overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .filter-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 24px; color: var(--navy); }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-body); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
        .filter-select { width: 100%; padding: 12px 16px; background: var(--ivory-linen); border: 1px solid var(--champagne-silt); border-radius: 6px; color: var(--charcoal); font-size: 14px; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s ease; }
        .filter-select:hover { border-color: var(--blue-accent); }
        .filter-select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(15,43,76,0.08); }
        .filter-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .filter-btn { padding: 12px; border: 2px solid var(--champagne-silt); border-radius: 6px; background: transparent; color: var(--navy); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: 'Montserrat', sans-serif; }
        .filter-btn.primary { background: var(--navy); color: #FFFFFF; border-color: var(--navy); }
        .filter-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,43,76,0.1); }
        .filter-btn.primary:hover { background: var(--navy-light); border-color: var(--navy-light); }
        .articles-container { display: grid; gap: 24px; }
        .category-header { background: var(--blue-pale); padding: 16px 24px; border-radius: 8px; border-left: 4px solid var(--navy); font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: var(--navy); }
        .article-card { background: var(--pure-white); border-radius: 8px; padding: 24px; border: 1px solid var(--champagne-silt); transition: all 0.3s ease; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .article-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--navy); transform: scaleY(0); transition: transform 0.3s ease; }
        .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(15,43,76,0.12); border-color: var(--blue-accent); }
        .article-card:hover::before { transform: scaleY(1); }
        .article-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .article-title { font-family: 'Public Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 12px; line-height: 1.4; cursor: pointer; }
        .article-title:hover { color: var(--blue-accent); }
        .article-meta { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-body); font-weight: 500; }
        .meta-icon { width: 16px; height: 16px; opacity: 0.6; stroke: var(--blue-accent); }
        .article-summary { font-size: 14px; color: var(--text-body); line-height: 1.6; margin-top: 8px; }
        .article-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
        .tag { padding: 6px 14px; background: var(--blue-pale); border: 1px solid var(--blue-border); border-radius: 20px; font-size: 12px; color: var(--blue-accent); font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .tag:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(46, 110, 181, 0.2); background: var(--blue-accent); color: white; }
        .tag.competitor { background: rgba(15,43,76,0.08); border-color: rgba(15,43,76,0.2); color: var(--navy); }
        .tag.competitor:hover { background: var(--navy); color: white; }
        .tag.category-tag { background: rgba(201, 168, 76, 0.1); border-color: var(--gold-accent); color: #8B7335; }
        .tag.category-tag:hover { background: var(--gold-accent); color: white; }
        .two-column { display: grid; grid-template-columns: 280px 1fr; gap: 32px; }
        .pagination-container { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 32px; padding: 16px 0; }
        .page-btn { padding: 8px 14px; border: 1px solid var(--champagne-silt); border-radius: 6px; background: var(--pure-white); color: var(--navy); font-size: 13px; font-weight: 600; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.2s ease; min-width: 38px; text-align: center; }
        .page-btn:hover { border-color: var(--navy); background: var(--blue-pale); }
        .page-btn.active { background: var(--navy); color: #FFFFFF; border-color: var(--navy); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 13px; color: var(--text-secondary); font-weight: 500; margin: 0 8px; }
        .empty-state { text-align: center; padding: 80px 40px; background: var(--pure-white); border-radius: 8px; border: 2px dashed var(--champagne-silt); box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 12px; color: var(--navy); }
        .empty-state p { color: var(--text-body); font-size: 16px; line-height: 1.6; max-width: 500px; margin: 0 auto; }
        .retry-btn { background: var(--navy); color: #FFFFFF; border: none; padding: 14px 32px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; }
        .retry-btn:hover { background: var(--navy-light); transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--ivory-linen); }
        ::-webkit-scrollbar-thumb { background: var(--champagne-silt); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blue-accent); }
        @media (max-width: 1024px) { .two-column { grid-template-columns: 1fr; } .filter-panel { position: relative; top: 0; max-height: none; } }
        @media (max-width: 768px) { .header-content { flex-direction: column; gap: 16px; padding: 16px 20px; } .header-title h1 { font-size: 24px; } .header-center { order: -1; } .nav-tabs { overflow-x: auto; padding-bottom: 16px; } .tab-btn { white-space: nowrap; } .toolbar { flex-direction: column; gap: 12px; align-items: flex-start; } } 
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="ivy-brand-block">
                        <div class="ivy-brand">IVY</div>
                        <div class="brand-divider"></div>
                        <div class="brand-caption">Living Intelligence</div>
                    </div>
                </div>
                <div class="header-center">
                    <div class="header-title">
                        <h1>Competitor Intelligence</h1>
                        <div class="header-subtitle">Strategic Market Analysis Platform</div>
                    </div>
                </div>
                <div class="header-right">
                    <img src="https://raw.githubusercontent.com/Apoorvasankuri/Competitor-Intelligence-Dashboard_UI/main/KEC%20Logo.png" alt="KEC International" class="kec-logo">
                </div>
            </div>
        </header>
        <div class="toolbar">
            <button class="refresh-btn" onclick="loadDataFromAPI()">
                <span class="refresh-icon">&#8635;</span> Refresh Data
            </button>
    
            <div class="toolbar-right">
                <span class="page-size-label">Articles per page:</span>
                <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>
        <nav class="nav-tabs" id="navTabs">
            <button class="tab-btn active" onclick="switchTab('executive')">Executive Summary</button>
            <button class="tab-btn" onclick="switchTab('competitor')">Competitor &amp; SBU</button>
            <button class="tab-btn" onclick="switchTab('industry')">Industry</button>
        </nav>
        <main class="content-area" id="contentArea"></main>
    </div>
    <script>
        var API_BASE_URL = 'https://competitor-intelligence-dashboard.onrender.com';
        var appData = { allArticles: [], currentTab: 'executive', filters: { sbu: 'All', competitor: 'All', category: 'All', period: 'All' }, isLoading: false, currentPage: 1, pageSize: 20 };
        var COMPETITOR_ALIAS_MAP = {
            'larsen & toubro': 'L&T', 'larsen and toubro': 'L&T', 'l&t ltd': 'L&T', 'l&t limited': 'L&T', 'l&t construction': 'L&T', 'l&t power': 'L&T', 'l&t metro': 'L&T', 'l&t': 'L&T',
            'tata projects ltd': 'Tata Projects', 'tata projects limited': 'Tata Projects', 'tata projects': 'Tata Projects',
            'kalpataru power transmission': 'Kalpataru', 'kalpataru projects international': 'Kalpataru', 'kptl': 'Kalpataru', 'kalpataru': 'Kalpataru',
            'abb india': 'ABB', 'abb limited': 'ABB', 'abb ltd': 'ABB', 'abb': 'ABB',
            'siemens india': 'Siemens', 'siemens limited': 'Siemens', 'siemens ag': 'Siemens', 'siemens': 'Siemens',
            'ircon international': 'IRCON', 'ircon international ltd': 'IRCON', 'ircon': 'IRCON',
            'rail vikas nigam': 'RVNL', 'rail vikas nigam limited': 'RVNL', 'rvnl': 'RVNL',
            'sterling and wilson': 'Sterling & Wilson', 'sterling & wilson': 'Sterling & Wilson', 's&w': 'Sterling & Wilson', 'sterling and wilson renewable energy': 'Sterling & Wilson', 'sterling & wilson renewable energy': 'Sterling & Wilson',
            'sterlite power': 'Sterlite', 'sterlite grid': 'Sterlite', 'sterlite': 'Sterlite',
            'ncc': 'NCC', 'ncc limited': 'NCC', 'ncc ltd': 'NCC',
            'shapoorji pallonji': 'Shapoorji', 'shapoorji': 'Shapoorji',
            'pnc infratech': 'PNC', 'pnc': 'PNC',
            'simplex infrastructures': 'Simplex', 'simplex': 'Simplex',
            'renew power': 'ReNew', 'renew': 'ReNew', 'renew energy': 'ReNew',
            'hero future energies': 'Hero Future', 'hero future': 'Hero Future',
            'adani': 'Adani', 'adani transmission': 'Adani', 'adani energy solutions': 'Adani',
            'megha engineering': 'Megha Engineering', 'meil': 'Megha Engineering',
            'power grid': 'Power Grid', 'powergrid': 'Power Grid', 'pgcil': 'Power Grid',
            'dilip buildcon': 'Dilip Buildcon', 'jmc projects': 'JMC Projects',
            'hg infra': 'HG Infra', 'h.g. infra': 'HG Infra',
            'techno electric': 'Techno Electric', 'cg power': 'CG Power', 'crompton greaves': 'CG Power',
            'ge t&d': 'GE T&D', 'ge vernova': 'GE T&D'
        };
        
        function normalizeCompetitor(name) {
            if (!name) return null;
            var trimmed = name.trim();
            if (trimmed === '-' || trimmed === '' || trimmed.toLowerCase() === 'none') return null;
            var lower = trimmed.toLowerCase();
            if (COMPETITOR_ALIAS_MAP[lower]) return COMPETITOR_ALIAS_MAP[lower];
            return trimmed;
        }
        
        function extractUniqueCompetitors(articles) {
            var set = new Set();
            articles.forEach(function(a) { a.competitors.forEach(function(c) { if (c) set.add(c); }); });
            return Array.from(set).sort();
        }
        
        function normalizeArticleCompetitors(rawList) {
            var result = [];
            rawList.forEach(function(c) { var norm = normalizeCompetitor(c); if (norm && result.indexOf(norm) === -1) result.push(norm); });
            return result;
        }
        
        function getDateCutoff(period) {
            if (period === 'All') return null;
            var now = new Date(); var cutoff = new Date();
            if (period === '7') cutoff.setDate(now.getDate() - 7);
            else if (period === '15') cutoff.setDate(now.getDate() - 15);
            else if (period === '30') cutoff.setDate(now.getDate() - 30);
            else if (period === '90') cutoff.setDate(now.getDate() - 90);
            else if (period === '180') cutoff.setDate(now.getDate() - 180);
            return cutoff;
        }
        
        function initApp() { loadDataFromAPI(); }
        
        async function loadDataFromAPI() {
            try {
                appData.isLoading = true;
                var response = await fetch(API_BASE_URL + '/api/data');
                if (!response.ok) throw new Error('API Error: ' + response.status);
                var result = await response.json();
                if (result.status === 'success' && result.data) {
                    appData.allArticles = result.data.map(function(row) {
                       var cleanTitle = row.newstitle || 'Untitled';
                       var source = row.Source || 'Unknown Source';
    
                       if (source !== 'Unknown Source') {
                           var patterns = [
                               ' - ' + source,
                               ' | ' + source,
                               ' – ' + source,
                               '- ' + source,
                               '| ' + source
                           ];
                           patterns.forEach(function(pattern) {
                               if (cleanTitle.endsWith(pattern)) {
                                   cleanTitle = cleanTitle.substring(0, cleanTitle.length - pattern.length).trim();
                               }
                           });
                       }
    
                       return { 
                           title: cleanTitle, 
                           date: row.publishedate || new Date().toISOString(), 
                           source: source, 
                           link: row.link || '#', 
                           category: row.category_tag || 'General', 
                           sbu: parseList(row.sbu_tagging || row.sbu || ''), 
                           competitors: normalizeArticleCompetitors(parseList(row.competitor_tagging || '')), 
                           summary: row.kec_business_summary || '' 
                       };
                    });
                    appData.currentPage = 1;
                    switchTab('executive');
                } else { throw new Error('Invalid API response'); }
                appData.isLoading = false;
            } catch (error) {
                appData.isLoading = false;
                document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9888;&#65039;</div><h3>Failed to Load Data</h3><p>Could not connect to the API.</p><p style="color:var(--text-secondary);font-size:14px;margin-top:16px;">Error: ' + error.message + '</p><button class="retry-btn" onclick="loadDataFromAPI()" style="margin-top:20px;">Retry</button></div>';
            }
        }
        
        function parseList(str) { if (!str) return []; return str.toString().split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; }); }
        function changePageSize() { appData.pageSize = parseInt(document.getElementById('pageSizeSelect').value); appData.currentPage = 1; switchTab(appData.currentTab); }
        function goToPage(page) { appData.currentPage = page; switchTab(appData.currentTab); window.scrollTo({ top: 200, behavior: 'smooth' }); }
        function paginateArticles(articles) { var start = (appData.currentPage - 1) * appData.pageSize; return articles.slice(start, start + appData.pageSize); }
        
        function renderPagination(totalArticles) {
            var totalPages = Math.ceil(totalArticles / appData.pageSize);
            if (totalPages <= 1) return '';
            var html = '<div class="pagination-container"><span class="page-info">Page ' + appData.currentPage + ' of ' + totalPages + ' (' + totalArticles + ' articles)</span>';
            html += '<button class="page-btn" onclick="goToPage(1)" ' + (appData.currentPage === 1 ? 'disabled' : '') + '>&laquo;</button>';
            html += '<button class="page-btn" onclick="goToPage(' + (appData.currentPage - 1) + ')" ' + (appData.currentPage === 1 ? 'disabled' : '') + '>&lsaquo;</button>';
            var startP = Math.max(1, appData.currentPage - 2), endP = Math.min(totalPages, appData.currentPage + 2);
            for (var i = startP; i <= endP; i++) html += '<button class="page-btn' + (i === appData.currentPage ? ' active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
            html += '<button class="page-btn" onclick="goToPage(' + (appData.currentPage + 1) + ')" ' + (appData.currentPage === totalPages ? 'disabled' : '') + '>&rsaquo;</button>';
            html += '<button class="page-btn" onclick="goToPage(' + totalPages + ')" ' + (appData.currentPage === totalPages ? 'disabled' : '') + '>&raquo;</button></div>';
            return html;
        }
        
        function switchTab(tabName) {
            appData.currentTab = tabName;
            var btns = document.querySelectorAll('.tab-btn');
            btns.forEach(function(btn) { btn.classList.remove('active'); });
            btns.forEach(function(btn) {
                if (tabName === 'executive' && btn.textContent.indexOf('Executive') !== -1) btn.classList.add('active');
                if (tabName === 'competitor' && btn.textContent.indexOf('Competitor') !== -1) btn.classList.add('active');
                if (tabName === 'industry' && btn.textContent.indexOf('Industry') !== -1) btn.classList.add('active');
            });
            var c = document.getElementById('contentArea');
            if (appData.allArticles.length === 0) { c.innerHTML = renderEmptyState(); return; }
            if (tabName === 'executive') c.innerHTML = renderExecutiveSummary();
            else if (tabName === 'competitor') { c.innerHTML = renderCompetitorView(); setupFilterHandlers(); }
            else if (tabName === 'industry') c.innerHTML = renderIndustryView();
        }
        
        function renderExecutiveSummary() {
            var top15 = appData.allArticles.slice(0, 15);
            var grouped = groupByCategory(top15);
            var html = '<div class="articles-container">';
            Object.keys(grouped).sort().forEach(function(cat) {
                html += '<div class="category-header">' + cat.toUpperCase() + '</div>';
                grouped[cat].forEach(function(article) {
                    html += renderArticleCard(article);
                });
            });
            html += '</div>';
            return html;
        }
        
        function renderCompetitorView() {
            var allSBUs = new Set(), allCategories = new Set();
            var uniqueCompetitors = extractUniqueCompetitors(appData.allArticles);
            appData.allArticles.forEach(function(a) { a.sbu.forEach(function(s) { allSBUs.add(s); }); allCategories.add(a.category); });
            return '<div class="two-column"><aside class="filter-panel"><h3 class="filter-title">Filters</h3>' +
                '<div class="filter-group"><label>Period</label><select class="filter-select" id="periodFilter"><option value="All">All Time</option><option value="7">Last 7 Days</option><option value="15">Last 15 Days</option><option value="30">Last Month</option><option value="90">3 Months</option><option value="180">6 Months</option></select></div>' +
                '<div class="filter-group"><label>Business Unit</label><select class="filter-select" id="sbuFilter"><option value="All">All SBUs</option>' + Array.from(allSBUs).sort().map(function(s) { return '<option value="' + s + '">' + s + '</option>'; }).join('') + '</select></div>' +
                '<div class="filter-group"><label>Competitor</label><select class="filter-select" id="competitorFilter"><option value="All">All Competitors</option>' + uniqueCompetitors.map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('') + '</select></div>' +
                '<div class="filter-group"><label>Category</label><select class="filter-select" id="categoryFilter"><option value="All">All Categories</option>' + Array.from(allCategories).sort().map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('') + '</select></div>' +
                '<div class="filter-buttons"><button class="filter-btn primary" onclick="applyFilters()">Apply</button><button class="filter-btn" onclick="clearFilters()">Clear</button></div></aside>' +
                '<div id="filteredArticles">' + renderFilteredArticles() + '</div></div>';
        }
        
        function renderIndustryView() {
            var industryArticles = appData.allArticles.filter(function(a) {
                return a.category && a.category.toLowerCase() === 'industry trends';
            });
            var paginated = paginateArticles(industryArticles);
            var html = '<div class="articles-container">';
            if (paginated.length === 0) {
                html += '<div class="empty-state"><div class="empty-state-icon">🏭</div><h3>No Industry Articles</h3><p>No articles tagged with "Industry" category found.</p></div>';
            } else {
                html += '<div class="category-header">INDUSTRY</div>';
                paginated.forEach(function(a) {
                    html += renderArticleCard(a);
                });
            }
            html += '</div>' + renderPagination(industryArticles.length);
            return html;
        }
        
        // NEW: Function to handle tag clicks
        function filterByTag(type, value) {
            // Switch to Competitor & SBU tab
            switchTab('competitor');
            
            // Wait for DOM to update
            setTimeout(function() {
                // Set the appropriate filter
                if (type === 'sbu') {
                    appData.filters.sbu = value;
                    document.getElementById('sbuFilter').value = value;
                } else if (type === 'competitor') {
                    appData.filters.competitor = value;
                    document.getElementById('competitorFilter').value = value;
                } else if (type === 'category') {
                    appData.filters.category = value;
                    document.getElementById('categoryFilter').value = value;
                }
                
                // Apply filters
                applyFilters();
                
                // Scroll to top
                window.scrollTo({ top: 200, behavior: 'smooth' });
            }, 100);
        }
        
        function renderArticleCard(article) {
            var d = new Date(article.date);
            var fd = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            var sumHtml = article.summary ? '<div class="article-summary">' + article.summary + '</div>' : '';
            
            // Build tags HTML with click handlers
            var categoryTagsHtml = article.category ? 
                '<span class="tag category-tag" onclick="event.stopPropagation(); filterByTag(\'category\', \'' + article.category.replace(/'/g, "\\'") + '\')">' + article.category + '</span>' : '';
            
            var sbuTagsHtml = article.sbu.map(function(s) { 
                return '<span class="tag" onclick="event.stopPropagation(); filterByTag(\'sbu\', \'' + s.replace(/'/g, "\\'") + '\')">' + s + '</span>'; 
            }).join('');
            
            var competitorTagsHtml = article.competitors.map(function(c) { 
                return '<span class="tag competitor" onclick="event.stopPropagation(); filterByTag(\'competitor\', \'' + c.replace(/'/g, "\\'") + '\')">' + c + '</span>'; 
            }).join('');
            
            return '<div class="article-card">' +
                '<div class="article-header"><h3 class="article-title" onclick="window.open(\'' + article.link + '\', \'_blank\')">' + article.title + '</h3></div>' +
                '<div class="article-meta"><span class="meta-item"><svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>' + fd + '</span></div>' +
                sumHtml +
                '<div class="article-tags">' + categoryTagsHtml + sbuTagsHtml + competitorTagsHtml + '</div></div>';
        }
        
        function getFilteredArticles() {
            var filtered = appData.allArticles;
            if (appData.filters.period !== 'All') { var cutoff = getDateCutoff(appData.filters.period); if (cutoff) filtered = filtered.filter(function(a) { return new Date(a.date) >= cutoff; }); }
            if (appData.filters.sbu !== 'All') filtered = filtered.filter(function(a) { return a.sbu.indexOf(appData.filters.sbu) !== -1; });
            if (appData.filters.competitor !== 'All') filtered = filtered.filter(function(a) { return a.competitors.indexOf(appData.filters.competitor) !== -1; });
            if (appData.filters.category !== 'All') filtered = filtered.filter(function(a) { return a.category === appData.filters.category; });
            return filtered;
        }
        
        function renderFilteredArticles() {
            var filtered = getFilteredArticles();
            if (filtered.length === 0) return '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><h3>No Articles Found</h3><p>Try adjusting your filter criteria</p></div>';
            var paginated = paginateArticles(filtered);
            return '<div class="articles-container">' + paginated.map(function(a) { return renderArticleCard(a); }).join('') + '</div>' + renderPagination(filtered.length);
        }
        
        function setupFilterHandlers() {
            var p = document.getElementById('periodFilter'), s = document.getElementById('sbuFilter'), c = document.getElementById('competitorFilter'), cat = document.getElementById('categoryFilter');
            if (p) p.value = appData.filters.period; if (s) s.value = appData.filters.sbu; if (c) c.value = appData.filters.competitor; if (cat) cat.value = appData.filters.category;
        }
        
        function applyFilters() {
            appData.filters.period = document.getElementById('periodFilter').value;
            appData.filters.sbu = document.getElementById('sbuFilter').value;
            appData.filters.competitor = document.getElementById('competitorFilter').value;
            appData.filters.category = document.getElementById('categoryFilter').value;
            appData.currentPage = 1;
            document.getElementById('filteredArticles').innerHTML = renderFilteredArticles();
        }
        
        function clearFilters() {
            appData.filters = { sbu: 'All', competitor: 'All', category: 'All', period: 'All' };
            document.getElementById('periodFilter').value = 'All';
            document.getElementById('sbuFilter').value = 'All';
            document.getElementById('competitorFilter').value = 'All';
            document.getElementById('categoryFilter').value = 'All';
            appData.currentPage = 1;
            document.getElementById('filteredArticles').innerHTML = renderFilteredArticles();
        }
        
        function groupByCategory(articles) { var g = {}; articles.forEach(function(a) { var c = a.category || 'General'; if (!g[c]) g[c] = []; g[c].push(a); }); return g; }
        function renderEmptyState() { return '<div class="empty-state"><div class="empty-state-icon">&#128202;</div><h3>No Data Available</h3><p>The database is currently empty. Data will appear here once your scraping pipeline populates the database.</p><button class="retry-btn" onclick="loadDataFromAPI()" style="margin-top:20px;">Refresh Data</button></div>'; }
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
